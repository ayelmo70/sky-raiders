<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sky Raiders ✈</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0e1a;
    color: #e0f0ff;
    font-family: 'Exo 2', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  /* ── LOBBY SCREEN ── */
  #lobby {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    background: radial-gradient(ellipse at 50% 30%, #0d1f3c 0%, #050b18 100%);
  }

  #lobby::before {
    content: '';
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Ccircle cx='30' cy='30' r='1'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
  }

  .lobby-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 900;
    letter-spacing: 0.08em;
    background: linear-gradient(135deg, #00d4ff 0%, #0080ff 40%, #a020ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    margin-bottom: 0.2em;
    position: relative;
    animation: titlePulse 3s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.2); }
  }

  .lobby-subtitle {
    font-size: 1rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: #5080a0;
    margin-bottom: 3rem;
  }

  .lobby-form {
    display: flex; flex-direction: column;
    align-items: center; gap: 1.2rem;
    position: relative; z-index: 1;
  }

  .lobby-input {
    background: rgba(0, 120, 255, 0.08);
    border: 1.5px solid rgba(0, 180, 255, 0.3);
    border-radius: 8px;
    padding: 0.9rem 1.5rem;
    font-family: 'Exo 2', sans-serif;
    font-size: 1.1rem;
    color: #e0f4ff;
    width: 320px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .lobby-input::placeholder { color: #3a6080; }
  .lobby-input:focus {
    border-color: rgba(0, 200, 255, 0.7);
    box-shadow: 0 0 20px rgba(0, 160, 255, 0.2);
  }

  .lobby-btn {
    background: linear-gradient(135deg, #0060ff, #00c8ff);
    border: none;
    border-radius: 8px;
    padding: 1rem 3rem;
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: white;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(0, 120, 255, 0.4);
  }
  .lobby-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0, 180, 255, 0.5);
  }
  .lobby-btn:active { transform: translateY(0); }

  /* Airplane preview silhouettes */
  .plane-previews {
    display: flex; gap: 3rem; margin: 2rem 0;
  }

  .controls-hint {
    position: absolute; bottom: 2rem;
    font-size: 0.8rem;
    color: #304060;
    letter-spacing: 0.1em;
    text-align: center;
  }

  /* ── GAME SCREEN ── */
  #gameScreen { display: none; position: relative; width: 100vw; height: 100vh; }

  canvas {
    display: block;
    cursor: crosshair;
  }

  /* ── HUD ── */
  #hud {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  /* Health bar */
  #healthBar {
    position: absolute;
    bottom: 28px; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
  }
  .health-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: #607090;
  }
  .health-track {
    width: 240px; height: 10px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 5px;
    overflow: hidden;
  }
  #healthFill {
    height: 100%;
    background: linear-gradient(90deg, #ff3a3a, #ffaa00, #44ff44);
    background-size: 240px 100%;
    border-radius: 5px;
    transition: width 0.2s;
  }

  /* Kills counter */
  #killsDisplay {
    position: absolute;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    color: #4090c0;
    background: rgba(0,10,30,0.6);
    padding: 6px 18px;
    border-radius: 20px;
    border: 1px solid rgba(0,120,255,0.2);
  }

  /* Buff indicators */
  #buffs {
    position: absolute;
    bottom: 70px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 10px;
  }
  .buff-icon {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-family: 'Orbitron', monospace;
    letter-spacing: 0.05em;
    border: 1px solid currentColor;
    animation: buffPulse 1s ease-in-out infinite;
  }
  @keyframes buffPulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }
  .buff-speed { color: #00d4ff; background: rgba(0,212,255,0.15); }
  .buff-damage { color: #ff4444; background: rgba(255,60,60,0.15); }
  .buff-shield { color: #a060ff; background: rgba(140,60,255,0.15); }

  /* Respawn overlay */
  #respawnMsg {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Orbitron', monospace;
    font-size: 2.5rem;
    font-weight: 900;
    color: #ff4444;
    text-shadow: 0 0 30px rgba(255,60,60,0.6);
    display: none;
    text-align: center;
  }
  #respawnMsg .sub { font-size: 1rem; color: #a04040; margin-top: 0.5rem; }

  /* Leaderboard */
  #leaderboard {
    position: absolute;
    top: 16px; right: 16px;
    background: rgba(0,10,30,0.75);
    border: 1px solid rgba(0,100,200,0.3);
    border-radius: 10px;
    padding: 12px 16px;
    min-width: 200px;
    backdrop-filter: blur(8px);
  }
  .lb-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: #3060a0;
    text-transform: uppercase;
    margin-bottom: 10px;
    text-align: center;
  }
  .lb-row {
    display: flex; align-items: center;
    gap: 8px; padding: 3px 0;
    font-size: 0.8rem;
  }
  .lb-rank { color: #304060; font-size: 0.7rem; width: 14px; }
  .lb-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .lb-name { flex: 1; color: #c0d8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lb-kills { color: #00d4ff; font-family: 'Orbitron', monospace; font-size: 0.7rem; }

  /* Minimap */
  #minimap {
    position: absolute;
    bottom: 16px; right: 16px;
    width: 140px; height: 140px;
    background: rgba(0,10,30,0.8);
    border: 1px solid rgba(0,100,200,0.3);
    border-radius: 8px;
    overflow: hidden;
  }

  /* Chat */
  #chatBox {
    position: absolute;
    bottom: 16px; left: 16px;
    width: 280px;
    max-height: 160px;
    overflow: hidden;
    display: flex; flex-direction: column;
    gap: 4px;
  }
  .chat-msg {
    font-size: 0.75rem;
    color: #607090;
    background: rgba(0,10,30,0.5);
    padding: 3px 8px;
    border-radius: 4px;
    animation: fadeMsg 8s forwards;
  }
  @keyframes fadeMsg { 0%,80% { opacity:1; } 100% { opacity:0; } }
</style>
</head>
<body>

<!-- ── LOBBY ── -->
<div id="lobby">
  <div class="lobby-title">SKY RAIDERS</div>
  <div class="lobby-subtitle">Multiplayer Aerial Combat</div>

  <canvas id="lobbyCanvas" style="position:absolute;inset:0;opacity:0.3;pointer-events:none;"></canvas>

  <div class="lobby-form">
    <input class="lobby-input" id="nicknameInput" type="text"
           placeholder="Enter your callsign..." maxlength="20" autocomplete="off">
    <button class="lobby-btn" id="joinBtn">TAKE OFF</button>
  </div>

  <div class="controls-hint">
    WASD → Move &nbsp;|&nbsp; Mouse → Aim &nbsp;|&nbsp; Click → Shoot &nbsp;|&nbsp; Shift → Boost
  </div>
</div>

<!-- ── GAME ── -->
<div id="gameScreen">
  <canvas id="gameCanvas"></canvas>

  <div id="hud">
    <div id="killsDisplay">KILLS: 0</div>

    <div id="leaderboard">
      <div class="lb-title">⚡ Leaderboard</div>
      <div id="lbRows"></div>
    </div>

    <canvas id="minimap"></canvas>

    <div id="buffs"></div>

    <div id="healthBar">
      <div class="health-label">HULL INTEGRITY</div>
      <div class="health-track"><div id="healthFill" style="width:100%"></div></div>
    </div>

    <div id="chatBox"></div>

    <div id="respawnMsg">
      DESTROYED
      <div class="sub" id="respawnCountdown">Respawning...</div>
    </div>
  </div>
</div>

<!-- Socket.io CDN -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
/**
 * SKY RAIDERS – Client
 * Canvas-based renderer + Socket.io game client
 */

// ─── Lobby Animation ───────────────────────────────────────────────────────
const lc = document.getElementById('lobbyCanvas');
const lctx = lc.getContext('2d');
let lobbyStars = [];

function initLobby() {
  lc.width = window.innerWidth;
  lc.height = window.innerHeight;
  lobbyStars = Array.from({length: 120}, () => ({
    x: Math.random() * lc.width,
    y: Math.random() * lc.height,
    r: Math.random() * 1.5,
    s: 0.2 + Math.random() * 0.5
  }));
}

function lobbyLoop() {
  if (!document.getElementById('lobby').style.display !== 'none') return;
  lctx.clearRect(0, 0, lc.width, lc.height);
  for (const s of lobbyStars) {
    s.y += s.s;
    if (s.y > lc.height) { s.y = 0; s.x = Math.random() * lc.width; }
    lctx.fillStyle = `rgba(180,220,255,${0.3 + Math.random()*0.3})`;
    lctx.beginPath();
    lctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    lctx.fill();
  }
  requestAnimationFrame(lobbyLoop);
}

initLobby();
lobbyLoop();
window.addEventListener('resize', initLobby);

// ─── Join Logic ────────────────────────────────────────────────────────────
const socket = io();
let selfId = null;
let nickname = '';
let worldData = null; // {islands, clouds, mapW, mapH}

document.getElementById('joinBtn').addEventListener('click', joinGame);
document.getElementById('nicknameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinGame();
});

function joinGame() {
  nickname = document.getElementById('nicknameInput').value.trim() || 'Pilot';
  socket.emit('join', nickname);
}

socket.on('init', (data) => {
  selfId = data.selfId;
  worldData = data;
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'block';
  initGame();
});

// ─── Game Variables ────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const mm = document.getElementById('minimap');
const mctx = mm.getContext('2d');

let gameState = null;  // latest from server
let localSelf = null;  // our player snapshot

// Particles (client-side only)
let particles = [];
let contrails = [];
let shakeTimer = 0;

// Input state
const keys = {};
let mouseAngle = 0;
let mouseX = 0, mouseY = 0;

function initGame() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  mm.width = 140;
  mm.height = 140;
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
  gameLoop();
}

// ─── Input Listeners ───────────────────────────────────────────────────────
window.addEventListener('keydown', e => { keys[e.key] = true; });
window.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  if (localSelf) {
    const camX = localSelf.x - canvas.width/2;
    const camY = localSelf.y - canvas.height/2;
    mouseAngle = Math.atan2(e.clientY + camY - localSelf.y, e.clientX + camX - localSelf.x);
  }
});

canvas.addEventListener('click', () => {
  if (localSelf && localSelf.alive) {
    socket.emit('shoot', mouseAngle);
  }
});

// ─── Send Input Every Frame ────────────────────────────────────────────────
let lastInputSend = 0;
function sendInput() {
  const now = Date.now();
  if (now - lastInputSend < 16) return;
  lastInputSend = now;
  socket.emit('input', {
    up: !!(keys['w'] || keys['W'] || keys['ArrowUp']),
    down: !!(keys['s'] || keys['S'] || keys['ArrowDown']),
    left: !!(keys['a'] || keys['A'] || keys['ArrowLeft']),
    right: !!(keys['d'] || keys['D'] || keys['ArrowRight']),
    boost: !!(keys['Shift']),
    mouseAngle,
  });
}

// ─── Server Events ─────────────────────────────────────────────────────────
socket.on('state', (state) => {
  gameState = state;
  const me = state.players.find(p => p.id === selfId);
  if (me) {
    localSelf = me;
    updateHUD(me, state.leaderboard);
  }
});

socket.on('explosion', ({ x, y }) => {
  spawnExplosion(x, y);
  shakeTimer = 18;
});

socket.on('bulletHit', ({ x, y }) => {
  spawnHitSpark(x, y);
});

socket.on('shieldHit', ({ x, y }) => {
  spawnShieldFlash(x, y);
});

socket.on('powerupCollected', () => {});

socket.on('chat', (msg) => {
  addChat(msg);
});

// ─── Particle Systems ──────────────────────────────────────────────────────
function spawnExplosion(x, y) {
  for (let i = 0; i < 60; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 1 + Math.random() * 7;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1, decay: 0.015 + Math.random() * 0.025,
      r: 3 + Math.random() * 8,
      color: `hsl(${20 + Math.random()*40}, 100%, ${50 + Math.random()*30}%)`,
      type: 'fire'
    });
  }
  // Smoke puffs
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    particles.push({
      x, y,
      vx: Math.cos(angle) * (0.5 + Math.random() * 2),
      vy: Math.sin(angle) * (0.5 + Math.random() * 2) - 0.5,
      life: 1, decay: 0.008,
      r: 12 + Math.random() * 20,
      color: '#444',
      type: 'smoke'
    });
  }
}

function spawnHitSpark(x, y) {
  for (let i = 0; i < 8; i++) {
    const angle = Math.random() * Math.PI * 2;
    particles.push({
      x, y,
      vx: Math.cos(angle) * (2 + Math.random() * 4),
      vy: Math.sin(angle) * (2 + Math.random() * 4),
      life: 1, decay: 0.08,
      r: 2 + Math.random() * 3,
      color: '#ffcc44',
      type: 'spark'
    });
  }
}

function spawnShieldFlash(x, y) {
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    particles.push({
      x, y,
      vx: Math.cos(angle) * (1 + Math.random() * 3),
      vy: Math.sin(angle) * (1 + Math.random() * 3),
      life: 1, decay: 0.05,
      r: 3 + Math.random() * 5,
      color: '#aa60ff',
      type: 'shield'
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05; // gravity
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ─── Contrails ─────────────────────────────────────────────────────────────
let contrailTick = 0;
function updateContrails(players) {
  contrailTick++;
  if (contrailTick % 3 !== 0) return;
  for (const p of players) {
    if (!p.alive) continue;
    contrails.push({
      x: p.x - Math.cos(p.angle) * 28,
      y: p.y - Math.sin(p.angle) * 28,
      life: 1,
      decay: 0.025,
      color: p.color
    });
  }
  for (let i = contrails.length - 1; i >= 0; i--) {
    contrails[i].life -= contrails[i].decay;
    if (contrails[i].life <= 0) contrails.splice(i, 1);
  }
}

// ─── Drawing Helpers ───────────────────────────────────────────────────────

function drawPlane(x, y, angle, color, health, nickname, buffs, isSelf) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle + Math.PI / 2);

  // Shield glow
  if (buffs && buffs.shield > 0) {
    ctx.beginPath();
    ctx.arc(0, 0, 32, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(160, 80, 255, 0.6)';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(160, 80, 255, 0.2)';
    ctx.lineWidth = 8;
    ctx.stroke();
  }

  // Speed boost glow
  if (buffs && buffs.speed > 0) {
    ctx.shadowColor = '#00d4ff';
    ctx.shadowBlur = 20;
  }

  // Body
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, -22);       // nose
  ctx.lineTo(8, 2);
  ctx.lineTo(5, 8);
  ctx.lineTo(0, 5);
  ctx.lineTo(-5, 8);
  ctx.lineTo(-8, 2);
  ctx.closePath();
  ctx.fill();

  // Wings
  ctx.fillStyle = shadeColor(color, -20);
  // left wing
  ctx.beginPath();
  ctx.moveTo(-4, 0);
  ctx.lineTo(-22, 10);
  ctx.lineTo(-16, 14);
  ctx.lineTo(-3, 4);
  ctx.closePath();
  ctx.fill();
  // right wing
  ctx.beginPath();
  ctx.moveTo(4, 0);
  ctx.lineTo(22, 10);
  ctx.lineTo(16, 14);
  ctx.lineTo(3, 4);
  ctx.closePath();
  ctx.fill();

  // Tail fins
  ctx.fillStyle = shadeColor(color, -30);
  ctx.beginPath();
  ctx.moveTo(-2, 6);
  ctx.lineTo(-8, 14);
  ctx.lineTo(-5, 14);
  ctx.lineTo(0, 7);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(2, 6);
  ctx.lineTo(8, 14);
  ctx.lineTo(5, 14);
  ctx.lineTo(0, 7);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.fillStyle = 'rgba(180,230,255,0.8)';
  ctx.beginPath();
  ctx.ellipse(0, -10, 4, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Engine glow (back)
  ctx.fillStyle = 'rgba(255,160,40,0.7)';
  ctx.beginPath();
  ctx.ellipse(0, 8, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.restore();

  // ── Health bar above plane ──
  const barW = 40, barH = 5;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(x - barW/2, y - 38, barW, barH);
  const pct = Math.max(0, health / 100);
  const hColor = pct > 0.6 ? '#44ff88' : pct > 0.3 ? '#ffcc00' : '#ff4444';
  ctx.fillStyle = hColor;
  ctx.fillRect(x - barW/2, y - 38, barW * pct, barH);

  // ── Nickname ──
  ctx.font = isSelf ? 'bold 12px Exo 2' : '11px Exo 2';
  ctx.textAlign = 'center';
  ctx.fillStyle = isSelf ? '#ffffff' : 'rgba(200,220,255,0.8)';
  ctx.strokeStyle = 'rgba(0,0,0,0.7)';
  ctx.lineWidth = 3;
  ctx.strokeText(nickname, x, y - 46);
  ctx.fillText(nickname, x, y - 46);
}

function shadeColor(hex, pct) {
  // Simple color darkening
  let r = parseInt(hex.slice(1,3), 16);
  let g = parseInt(hex.slice(3,5), 16);
  let b = parseInt(hex.slice(5,7), 16);
  r = Math.max(0, Math.min(255, r + pct));
  g = Math.max(0, Math.min(255, g + pct));
  b = Math.max(0, Math.min(255, b + pct));
  return `rgb(${r},${g},${b})`;
}

function drawBullet(x, y) {
  ctx.save();
  ctx.fillStyle = '#ffee44';
  ctx.shadowColor = '#ffcc00';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(x, y, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawIsland(isl) {
  ctx.save();
  ctx.translate(isl.x, isl.y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(8, 14, isl.rx * 0.9, isl.ry * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Rock base
  ctx.fillStyle = '#4a3a2a';
  ctx.beginPath();
  ctx.ellipse(0, 10, isl.rx * 0.7, isl.ry * 0.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Grass top
  ctx.fillStyle = isl.color;
  ctx.beginPath();
  ctx.ellipse(0, 0, isl.rx, isl.ry, 0, 0, Math.PI * 2);
  ctx.fill();

  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.beginPath();
  ctx.ellipse(-isl.rx*0.2, -isl.ry*0.3, isl.rx*0.5, isl.ry*0.3, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawCloud(c) {
  ctx.save();
  ctx.globalAlpha = c.alpha;
  ctx.fillStyle = '#d0e8f8';

  function puff(ox, oy, r) {
    ctx.beginPath();
    ctx.arc(c.x + ox, c.y + oy, r, 0, Math.PI * 2);
    ctx.fill();
  }
  const w = c.w, h = c.h;
  puff(0, 0, h * 0.5);
  puff(w * 0.25, h * 0.1, h * 0.42);
  puff(-w * 0.25, h * 0.1, h * 0.4);
  puff(w * 0.45, h * 0.2, h * 0.3);
  puff(-w * 0.45, h * 0.2, h * 0.3);

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawPowerup(pu) {
  ctx.save();
  ctx.translate(pu.x, pu.y);
  const t = Date.now() / 1000;
  ctx.rotate(t);

  let emoji, glow;
  if (pu.type === 'speed') { emoji = '⚡'; glow = '#00d4ff'; }
  else if (pu.type === 'double_damage') { emoji = '💥'; glow = '#ff4444'; }
  else { emoji = '🛡'; glow = '#aa60ff'; }

  // Glow ring
  ctx.beginPath();
  ctx.arc(0, 0, 18, 0, Math.PI * 2);
  ctx.strokeStyle = glow;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.5 + 0.3 * Math.sin(t * 3);
  ctx.stroke();
  ctx.globalAlpha = 1;

  ctx.font = '20px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, 0, 0);

  ctx.restore();
}

function drawBackground(camX, camY) {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#0a1a3a');
  grad.addColorStop(1, '#0d3060');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines (subtle)
  ctx.strokeStyle = 'rgba(0,80,160,0.08)';
  ctx.lineWidth = 1;
  const gs = 100;
  const startX = (-camX % gs + gs) % gs;
  const startY = (-camY % gs + gs) % gs;
  for (let x = startX; x < canvas.width; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = startY; y < canvas.height; y += gs) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }
}

// ─── HUD Updates ───────────────────────────────────────────────────────────
function updateHUD(me, leaderboard) {
  // Health
  const pct = Math.max(0, me.health / 100);
  document.getElementById('healthFill').style.width = (pct * 100) + '%';

  // Kills
  document.getElementById('killsDisplay').textContent = `KILLS: ${me.kills}`;

  // Respawn
  const rm = document.getElementById('respawnMsg');
  if (!me.alive) {
    rm.style.display = 'block';
    const secs = Math.ceil(Math.max(0, me.respawnTimer) / 1000);
    document.getElementById('respawnCountdown').textContent = `Respawning in ${secs}s...`;
  } else {
    rm.style.display = 'none';
  }

  // Buffs
  const buffsDiv = document.getElementById('buffs');
  buffsDiv.innerHTML = '';
  if (me.buffs) {
    if (me.buffs.speed > 0) buffsDiv.innerHTML += `<div class="buff-icon buff-speed">⚡ SPEED</div>`;
    if (me.buffs.double_damage > 0) buffsDiv.innerHTML += `<div class="buff-icon buff-damage">💥 2X DMG</div>`;
    if (me.buffs.shield > 0) buffsDiv.innerHTML += `<div class="buff-icon buff-shield">🛡 SHIELD</div>`;
  }

  // Leaderboard
  const lbDiv = document.getElementById('lbRows');
  lbDiv.innerHTML = leaderboard.map((p, i) => `
    <div class="lb-row">
      <span class="lb-rank">${i + 1}</span>
      <span class="lb-dot" style="background:${p.color}"></span>
      <span class="lb-name">${p.nickname}</span>
      <span class="lb-kills">${p.kills}</span>
    </div>
  `).join('');
}

function addChat(msg) {
  const box = document.getElementById('chatBox');
  const el = document.createElement('div');
  el.className = 'chat-msg';
  el.textContent = msg;
  box.appendChild(el);
  while (box.children.length > 6) box.removeChild(box.firstChild);
  setTimeout(() => el.remove(), 8000);
}

// ─── Minimap ───────────────────────────────────────────────────────────────
function drawMinimap(players, self, mapW, mapH) {
  const W = mm.width, H = mm.height;
  mctx.clearRect(0, 0, W, H);

  mctx.fillStyle = 'rgba(0,15,40,0.9)';
  mctx.fillRect(0, 0, W, H);

  // Islands
  if (worldData) {
    mctx.fillStyle = 'rgba(60,120,60,0.5)';
    for (const isl of worldData.islands) {
      const px = isl.x / mapW * W;
      const py = isl.y / mapH * H;
      mctx.beginPath();
      mctx.ellipse(px, py, isl.rx/mapW*W, isl.ry/mapH*H, 0, 0, Math.PI*2);
      mctx.fill();
    }
  }

  // Players
  for (const p of players) {
    if (!p.alive) continue;
    const px = p.x / mapW * W;
    const py = p.y / mapH * H;
    mctx.fillStyle = p.id === selfId ? '#ffffff' : p.color;
    mctx.beginPath();
    mctx.arc(px, py, p.id === selfId ? 3.5 : 2.5, 0, Math.PI*2);
    mctx.fill();
  }

  // Border
  mctx.strokeStyle = 'rgba(0,100,200,0.4)';
  mctx.lineWidth = 1;
  mctx.strokeRect(0, 0, W, H);
}

// ─── Main Game Loop ────────────────────────────────────────────────────────
function gameLoop() {
  sendInput();
  requestAnimationFrame(gameLoop);

  if (!gameState || !localSelf) return;

  const { players, bullets, powerups, clouds } = gameState;
  const mapW = worldData ? worldData.mapW : 4000;
  const mapH = worldData ? worldData.mapH : 4000;

  // Camera follows self
  const camX = localSelf.x - canvas.width / 2;
  const camY = localSelf.y - canvas.height / 2;

  // Screen shake
  let shakeX = 0, shakeY = 0;
  if (shakeTimer > 0) {
    shakeX = (Math.random() - 0.5) * 10 * (shakeTimer / 18);
    shakeY = (Math.random() - 0.5) * 10 * (shakeTimer / 18);
    shakeTimer--;
  }

  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Background
  drawBackground(camX, camY);

  // Apply camera
  ctx.save();
  ctx.translate(-camX, -camY);

  // Islands (back layer)
  if (worldData) {
    for (const isl of worldData.islands) {
      drawIsland(isl);
    }
  }

  // Contrails
  updateContrails(players);
  for (const ct of contrails) {
    ctx.beginPath();
    ctx.arc(ct.x, ct.y, 3 * ct.life, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,230,255,${ct.life * 0.3})`;
    ctx.fill();
  }

  // Back-layer clouds (semi-transparent)
  for (const c of clouds) {
    if (c.alpha < 0.65) drawCloud(c);
  }

  // Power-ups
  for (const pu of powerups) {
    drawPowerup(pu);
  }

  // Bullets
  for (const b of bullets) {
    drawBullet(b.x, b.y);
  }

  // Players (below front clouds)
  for (const p of players) {
    if (!p.alive) continue;
    drawPlane(p.x, p.y, p.angle, p.color, p.health, p.nickname, p.buffs, p.id === selfId);
  }

  // Front-layer clouds (hide players underneath)
  for (const c of clouds) {
    if (c.alpha >= 0.65) drawCloud(c);
  }

  // Particles
  updateParticles();
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    if (p.type === 'smoke') {
      ctx.fillStyle = `rgba(80,80,80,${p.life * 0.4})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 6;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
  ctx.globalAlpha = 1;

  // Aim line for self
  if (localSelf && localSelf.alive) {
    const ax = localSelf.x;
    const ay = localSelf.y;
    ctx.strokeStyle = 'rgba(255,255,100,0.12)';
    ctx.lineWidth = 1;
    ctx.setLineDash([6, 8]);
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax + Math.cos(mouseAngle) * 180, ay + Math.sin(mouseAngle) * 180);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.restore(); // camera
  ctx.restore(); // shake

  // Minimap
  drawMinimap(players, localSelf, mapW, mapH);
}
